<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel – Add Extra (Dinner)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #FF3347;
    --ink: #F0E8FF;
    --ink-muted: #8A7AAA;
    --border: #2E2645;
  }

  body {
    background: #0D0A1A;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 48px 24px;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow-x: hidden;
  }

  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .phone {
    position: relative;
    z-index: 1;
  }

  .phone {
    width: 402px;
    height: 874px;
    background: #12101E;
    border-radius: 48px;
    overflow: hidden;
    border: 3px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(150,120,255,0.1);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Phone inner starfield canvas */
  #phone-stars {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    border-radius: 48px;
  }

  .status-bar, .page-header, .page-sub, .scroll-body { position: relative; z-index: 1; }

  /* STATUS BAR */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 30px 0; position: relative; flex-shrink: 0;
  }
  .notch {
    width: 126px; height: 36px; background: var(--ink);
    border-radius: 0 0 22px 22px;
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  }
  .status-time { font-size: 13px; font-weight: 800; color: var(--ink); z-index: 1; }
  .status-icons { display: flex; gap: 5px; align-items: center; z-index: 1; }

  /* PAGE HEADER */
  .page-header {
    padding: 20px 22px 4px;
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-shrink: 0;
  }
  .page-title {
    font-size: 26px; font-weight: 900;
    background: linear-gradient(135deg, #FFD580 0%, #FF8C42 40%, #FF5FA0 80%, #C77DFF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.03em; line-height: 1.1;
  }
  .close-btn {
    width: 36px; height: 36px; border-radius: 12px; margin-top: 2px;
    background: rgba(240,232,255,0.07); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 2px 2px 0 var(--border); flex-shrink: 0;
  }
  .page-sub {
    font-size: 12px; font-weight: 600; color: var(--ink-muted);
    padding: 4px 22px 20px; flex-shrink: 0;
  }

  /* SCROLL AREA */
  .scroll-body {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 32px;
  }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* SECTION LABEL */
  .section-label {
    padding: 0 22px 10px;
    font-size: 11px; font-weight: 900; color: var(--ink-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  /* MEAL OPTIONS GRID */
  .options-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px; padding: 4px 18px 0;
  }
  .option-card {
    border: 2.5px solid var(--border);
    border-radius: 18px;
    box-shadow: 3px 3px 0 var(--border);
    padding: 22px 14px 20px;
    cursor: pointer;
    transition: box-shadow 0.1s, transform 0.1s;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    text-align: center;
  }
  .option-card:active { box-shadow: 1px 1px 0 var(--border); transform: translate(2px,2px); }

  .option-top { display: flex; justify-content: center; align-items: center; }
  .option-icon {
    width: 52px; height: 52px; border-radius: 16px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .option-name { font-size: 13px; font-weight: 900; color: var(--ink); letter-spacing: -0.02em; line-height: 1.3; }

  /* QUICK ADD-ONS ROW */
  .snacks-row {
    display: flex; gap: 10px;
    padding: 0 18px 2px;
    overflow-x: auto;
  }
  .snacks-row::-webkit-scrollbar { display: none; }
  .snack-chip {
    flex-shrink: 0;
    background: #1A1630;
    border: 2px solid var(--border);
    border-radius: 14px;
    box-shadow: 3px 3px 0 var(--border);
    padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
    transition: box-shadow 0.1s, transform 0.1s;
  }
  .snack-chip:active { box-shadow: 1px 1px 0 var(--border); transform: translate(2px,2px); }
  .snack-chip-name { font-size: 12px; font-weight: 800; color: white; line-height: 1; }

  /* DIVIDER */
  .divider { margin: 20px 18px 0; height: 2px; background: rgba(240,232,255,0.08); border-radius: 1px; }

  /* SEARCH ROW */
  .search-row {
    margin: 12px 18px 0;
    background: #1E1A30;
    border: 2.5px solid var(--border);
    border-radius: 16px;
    box-shadow: 3px 3px 0 var(--border);
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
  }
  .search-row-icon {
    width: 36px; height: 36px; border-radius: 12px;
    background: #2A2240; border: 2px solid var(--border);
    box-shadow: 2px 2px 0 var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .search-row-text { flex: 1; }
  .search-row-label { font-size: 13px; font-weight: 900; color: var(--ink); letter-spacing: -0.01em; }
  .search-row-sub { font-size: 11px; font-weight: 600; color: var(--ink-muted); margin-top: 2px; }
</style>
</head>
<body>
<div class="phone">
  <canvas id="phone-stars"></canvas>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time" style="z-index:1">6:55</span>
    <div class="notch"></div>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--ink)">
        <rect x="0" y="7" width="3" height="5" rx="1"/>
        <rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/>
        <rect x="9" y="2" width="3" height="10" rx="1"/>
        <rect x="13.5" y="0" width="2.5" height="12" rx="1"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="var(--ink)" stroke-width="1.5" stroke-linecap="round">
        <path d="M1 4.5C4 1.5 12 1.5 15 4.5"/>
        <path d="M3.5 7C5.5 5 10.5 5 12.5 7"/>
        <circle cx="8" cy="10.5" r="1" fill="var(--ink)" stroke="none"/>
      </svg>
      <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
        <rect x=".5" y=".5" width="20" height="11" rx="3.5" stroke="var(--ink)" stroke-width="1"/>
        <rect x="2" y="2" width="15" height="8" rx="2" fill="var(--ink)"/>
        <path d="M21.5 4v4a2.5 2.5 0 000-4z" fill="var(--ink)"/>
      </svg>
    </div>
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title">Eat anything<br>else at dinner?</div>
    <div class="close-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2.5" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
  </div>
  <div class="page-sub" style="display:block; font-size:12px; font-weight:500; color:#8A7AAA; padding: 2px 22px 18px;">We'll add it to tonight's totals 🌙</div>

  <!-- Scrollable content -->
  <div class="scroll-body">

    <div class="options-grid">

      <div class="option-card" style="background:#1E1420;">
        <div class="option-top">
          <div class="option-icon" style="background:#2A1E18;border-color:#6B3620;">🥩</div>
        </div>
        <div class="option-name">Grilled Steak & Veg</div>
      </div>

      <div class="option-card" style="background:#1A1810;">
        <div class="option-top">
          <div class="option-icon" style="background:#252010;border-color:#7A6600;">🍚</div>
        </div>
        <div class="option-name">Rice & Stir Fry</div>
      </div>

      <div class="option-card" style="background:#0F1A14;">
        <div class="option-top">
          <div class="option-icon" style="background:#122018;border-color:#166034;">🐟</div>
        </div>
        <div class="option-name">Baked Salmon Bowl</div>
      </div>

      <div class="option-card" style="background:#160E20;">
        <div class="option-top">
          <div class="option-icon" style="background:#1E1230;border-color:#5B21B6;">🍲</div>
        </div>
        <div class="option-name">Lentil Soup & Bread</div>
      </div>

    </div>

    <div class="section-label" style="padding: 20px 22px 10px;">Quick Add-ons</div>
    <div class="snacks-row">
      <div class="snack-chip">
        <span style="font-size:16px;">🍞</span>
        <div class="snack-chip-name">Dinner Roll</div>
      </div>
      <div class="snack-chip">
        <span style="font-size:16px;">🥗</span>
        <div class="snack-chip-name">Side Salad</div>
      </div>
      <div class="snack-chip">
        <span style="font-size:16px;">🧀</span>
        <div class="snack-chip-name">Cheese Slice</div>
      </div>
      <div class="snack-chip">
        <span style="font-size:16px;">🍮</span>
        <div class="snack-chip-name">Pudding Cup</div>
      </div>
    </div>

  </div><!-- /scroll-body -->

</div><!-- /phone -->
<canvas id="starfield"></canvas>

<script>
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Generate stars
const stars = Array.from({ length: 220 }, () => ({
  x: Math.random(),
  y: Math.random(),
  r: Math.random() * 1.4 + 0.2,
  alpha: Math.random() * 0.6 + 0.2,
  twinkleSpeed: Math.random() * 0.02 + 0.005,
  twinklePhase: Math.random() * Math.PI * 2,
}));

// Shooting stars
const shoots = [];
function spawnShoot() {
  shoots.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height * 0.5,
    len: Math.random() * 100 + 60,
    speed: Math.random() * 6 + 4,
    alpha: 1,
    angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
  });
}
setInterval(spawnShoot, 3200);

// ── Phone inner starfield ──────────────────────────────────────
const pc = document.getElementById('phone-stars');
const px = pc.getContext('2d');
const phoneEl = pc.parentElement;

function resizePhone() {
  pc.width = phoneEl.clientWidth;
  pc.height = phoneEl.clientHeight;
}
resizePhone();
window.addEventListener('resize', resizePhone);

const phoneStars = Array.from({ length: 160 }, () => ({
  x: Math.random(),
  y: Math.random(),
  r: Math.random() * 1.2 + 0.2,
  alpha: Math.random() * 0.5 + 0.15,
  ts: Math.random() * 0.025 + 0.006,
  tp: Math.random() * Math.PI * 2,
}));

// Tiny phone shooting stars
const pShoots = [];
function spawnPhoneShoot() {
  pShoots.push({
    x: Math.random() * pc.width,
    y: Math.random() * pc.height * 0.6,
    len: Math.random() * 55 + 30,
    speed: Math.random() * 4 + 3,
    alpha: 0.85,
    angle: Math.PI / 4 + (Math.random() - 0.5) * 0.25,
  });
}
setInterval(spawnPhoneShoot, 2800);

let pt = 0;
function drawPhone() {
  px.clearRect(0, 0, pc.width, pc.height);
  pt += 0.016;

  phoneStars.forEach(s => {
    const a = s.alpha * (0.5 + 0.5 * Math.sin(pt * s.ts * 60 + s.tp));
    // Occasional warm gold tint on some stars
    const hue = s.tp % (Math.PI * 2) < 1 ? `rgba(255,220,140,${a})` : s.tp % (Math.PI * 2) < 2 ? `rgba(255,180,200,${a})` : `rgba(210,200,255,${a})`;
    px.beginPath();
    px.arc(s.x * pc.width, s.y * pc.height, s.r, 0, Math.PI * 2);
    px.fillStyle = hue;
    px.fill();
  });

  for (let i = pShoots.length - 1; i >= 0; i--) {
    const s = pShoots[i];
    const g = px.createLinearGradient(s.x, s.y, s.x - Math.cos(s.angle)*s.len, s.y - Math.sin(s.angle)*s.len);
    g.addColorStop(0, `rgba(255,230,180,${s.alpha})`);
    g.addColorStop(1, 'rgba(255,200,120,0)');
    px.beginPath();
    px.moveTo(s.x, s.y);
    px.lineTo(s.x - Math.cos(s.angle)*s.len, s.y - Math.sin(s.angle)*s.len);
    px.strokeStyle = g;
    px.lineWidth = 1.2;
    px.stroke();
    s.x += Math.cos(s.angle) * s.speed;
    s.y += Math.sin(s.angle) * s.speed;
    s.alpha -= 0.022;
    if (s.alpha <= 0) pShoots.splice(i, 1);
  }

  requestAnimationFrame(drawPhone);
}
drawPhone();


let t = 0;
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  t += 0.016;

  // Stars
  stars.forEach(s => {
    const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed * 60 + s.twinklePhase));
    ctx.beginPath();
    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220, 210, 255, ${a})`;
    ctx.fill();
  });

  // Shooting stars
  for (let i = shoots.length - 1; i >= 0; i--) {
    const s = shoots[i];
    const grad = ctx.createLinearGradient(
      s.x, s.y,
      s.x - Math.cos(s.angle) * s.len,
      s.y - Math.sin(s.angle) * s.len
    );
    grad.addColorStop(0, `rgba(255,255,255,${s.alpha})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - Math.cos(s.angle) * s.len, s.y - Math.sin(s.angle) * s.len);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    s.x += Math.cos(s.angle) * s.speed;
    s.y += Math.sin(s.angle) * s.speed;
    s.alpha -= 0.018;
    if (s.alpha <= 0) shoots.splice(i, 1);
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
