<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel – Add Extra (Lunch)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #0096C7;
    --ink: #0A1A2A;
    --ink-muted: #6A8A9A;
    --border: #0A1A2A;
  }

  body {
    background: linear-gradient(160deg, #90D8F8 0%, #48B4E8 50%, #2196C8 100%);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 48px 24px;
    font-family: 'Inter', sans-serif;
  }

  .phone {
    width: 402px;
    height: 874px;
    background: linear-gradient(180deg, #E0F4FF 0%, #F0FAFF 30%, #EEF8F5 100%);
    border-radius: 48px;
    overflow: hidden;
    border: 3px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,80,160,0.25), 0 4px 12px rgba(0,0,0,0.1);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* STATUS BAR */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 30px 0; position: relative; flex-shrink: 0;
    background: linear-gradient(180deg, #7ECEF0 0%, #B8E4F8 100%);
  }
  .notch {
    width: 126px; height: 36px; background: #0A1A2A;
    border-radius: 0 0 22px 22px;
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  }
  .status-time { font-size: 13px; font-weight: 800; color: var(--ink); z-index: 1; }
  .status-icons { display: flex; gap: 5px; align-items: center; z-index: 1; }

  /* PAGE HEADER */
  .page-header {
    padding: 20px 22px 4px;
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-shrink: 0;
    background: linear-gradient(180deg, #B8E4F8 0%, transparent 100%);
  }
  .page-title { font-size: 26px; font-weight: 900; color: var(--ink); letter-spacing: -0.03em; line-height: 1.1; }
  .close-btn {
    width: 36px; height: 36px; border-radius: 12px; margin-top: 2px;
    background: rgba(144,216,248,0.5); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 2px 2px 0 var(--border); flex-shrink: 0;
  }
  .page-sub {
    font-size: 12px; font-weight: 600; color: #3A7A9A;
    padding: 4px 22px 20px; flex-shrink: 0;
  }

  /* SCROLL AREA */
  .scroll-body {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 32px;
  }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* SECTION LABEL */
  .section-label {
    padding: 0 22px 10px;
    font-size: 11px; font-weight: 900; color: #3A7A9A;
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  /* MEAL OPTIONS GRID */
  .options-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px; padding: 4px 18px 0;
  }
  .option-card {
    border: 2.5px solid var(--border);
    border-radius: 18px;
    box-shadow: 3px 3px 0 var(--border);
    padding: 22px 14px 20px;
    cursor: pointer;
    transition: box-shadow 0.1s, transform 0.1s;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    text-align: center;
    background: rgba(255,255,255,0.75);
  }
  .option-card:active { box-shadow: 1px 1px 0 var(--border); transform: translate(2px,2px); }

  .option-top { display: flex; justify-content: center; align-items: center; }
  .option-icon {
    width: 52px; height: 52px; border-radius: 16px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .option-name { font-size: 13px; font-weight: 900; color: var(--ink); letter-spacing: -0.02em; line-height: 1.3; }

  /* QUICK ADD-ONS ROW */
  .snacks-row {
    display: flex; gap: 10px;
    padding: 0 18px 2px;
    overflow-x: auto;
  }
  .snacks-row::-webkit-scrollbar { display: none; }
  .snack-chip {
    flex-shrink: 0;
    background: rgba(255,255,255,0.85);
    border: 2px solid var(--border);
    border-radius: 14px;
    box-shadow: 3px 3px 0 var(--border);
    padding: 9px 13px;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
    transition: box-shadow 0.1s, transform 0.1s;
  }
  .snack-chip:active { box-shadow: 1px 1px 0 var(--border); transform: translate(2px,2px); }
  .snack-chip-name { font-size: 12px; font-weight: 800; color: var(--ink); line-height: 1; }
  .snack-chip-kcal { font-size: 10px; font-weight: 600; color: var(--ink-muted); margin-top: 1px; }

  /* DIVIDER */
  .divider { margin: 20px 18px 0; height: 2px; background: rgba(0,80,160,0.1); border-radius: 1px; }

  /* SEARCH ROW */
  .search-row {
    margin: 12px 18px 0;
    background: #B8E4F8;
    border: 2.5px solid var(--border);
    border-radius: 16px;
    box-shadow: 3px 3px 0 var(--border);
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
  }
  .search-row-icon {
    width: 36px; height: 36px; border-radius: 12px;
    background: white; border: 2px solid var(--border);
    box-shadow: 2px 2px 0 var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .search-row-text { flex: 1; }
  .search-row-label { font-size: 13px; font-weight: 900; color: var(--ink); letter-spacing: -0.01em; }
  .search-row-sub { font-size: 11px; font-weight: 600; color: var(--ink-muted); margin-top: 2px; }
</style>
</head>
<body>
<div class="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time" style="z-index:1">12:24</span>
    <div class="notch"></div>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="var(--ink)">
        <rect x="0" y="7" width="3" height="5" rx="1"/>
        <rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/>
        <rect x="9" y="2" width="3" height="10" rx="1"/>
        <rect x="13.5" y="0" width="2.5" height="12" rx="1"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="var(--ink)" stroke-width="1.5" stroke-linecap="round">
        <path d="M1 4.5C4 1.5 12 1.5 15 4.5"/>
        <path d="M3.5 7C5.5 5 10.5 5 12.5 7"/>
        <circle cx="8" cy="10.5" r="1" fill="var(--ink)" stroke="none"/>
      </svg>
      <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
        <rect x=".5" y=".5" width="20" height="11" rx="3.5" stroke="var(--ink)" stroke-width="1"/>
        <rect x="2" y="2" width="15" height="8" rx="2" fill="var(--ink)"/>
        <path d="M21.5 4v4a2.5 2.5 0 000-4z" fill="var(--ink)"/>
      </svg>
    </div>
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title">Eat anything<br>else at lunch?</div>
    <div class="close-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2.5" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
  </div>
  <div class="page-sub">Log anything extra you had — we'll update your totals 🍽️</div>

  <!-- Scrollable content -->
  <div class="scroll-body">

    <div class="options-grid">

      <div class="option-card" style="background:rgba(220,240,255,0.6);">
        <div class="option-top">
          <div class="option-icon" style="background:#FDEBD6;border-color:#B8562A;">🍗</div>
        </div>
        <div class="option-name">Turkey Recovery</div>
      </div>

      <div class="option-card" style="background:rgba(220,255,235,0.6);">
        <div class="option-top">
          <div class="option-icon" style="background:#DCFCE7;border-color:#16A34A;">🥗</div>
        </div>
        <div class="option-name">Garden Protein Bowl</div>
      </div>

      <div class="option-card" style="background:rgba(255,248,220,0.6);">
        <div class="option-top">
          <div class="option-icon" style="background:#FFF9E0;border-color:#C8A800;">🍝</div>
        </div>
        <div class="option-name">Pasta Bolognese</div>
      </div>

      <div class="option-card" style="background:rgba(235,230,255,0.6);">
        <div class="option-top">
          <div class="option-icon" style="background:#F3E8FF;border-color:#9333EA;">🥪</div>
        </div>
        <div class="option-name">Deli Sandwich</div>
      </div>

    </div>

    <div class="section-label" style="padding: 20px 22px 10px;">Quick Add-ons</div>
    <div class="snacks-row">
      <div class="snack-chip">
        <span style="font-size:16px;">🍌</span>
        <div class="snack-chip-name">Banana</div>
      </div>
      <div class="snack-chip">
        <span style="font-size:16px;">🥛</span>
        <div class="snack-chip-name">Choco Milk</div>
      </div>
      <div class="snack-chip">
        <span style="font-size:16px;">🍎</span>
        <div class="snack-chip-name">Apple</div>
      </div>
      <div class="snack-chip">
        <span style="font-size:16px;">🥜</span>
        <div class="snack-chip-name">Peanut Butter</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="search-row">
      <div class="search-row-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
        </svg>
      </div>
      <div class="search-row-text">
        <div class="search-row-label">Search or Scan Something Else</div>
        <div class="search-row-sub">Didn't see it above? Add it manually</div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--ink-muted)" stroke-width="2" stroke-linecap="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </div>

  </div><!-- /scroll-body -->

</div><!-- /phone -->
</body>
</html>
